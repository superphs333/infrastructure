services:
  # 서비스 이름 정의 (Nginx Proxy Manager의 약자인 npm 사용함)
  npm:
    # 사용할 도커 이미지: 최신 안정화 버전 사용함
    image: jc21/nginx-proxy-manager:2.15.1
    
    # 컨테이너의 고유 이름: 터미널에서 식별하기 쉽게 지정함
    container_name: global-proxy-npm
    
    # 재시작 정책: 서버 재부팅 시나 비정상 종료 시 자동으로 다시 실행함 (수동 중단 제외)
    restart: unless-stopped
    
    # 포트 포워딩 설정 (호스트포트:컨테이너포트)
    ports:
      - "80:80"   # 일반적인 웹 접속(HTTP) 통로임
      - "443:443" # 보안 인증서가 적용된 웹 접속(HTTPS) 통로임
      - "127.0.0.1:81:81"   # 프록시 서버를 관리하는 웹 UI(대시보드) 접속 포트임
    
    # 데이터 보존을 위한 볼륨 설정 (호스트경로:컨테이너경로)
    volumes:
      # 설정값, 사용자 정보, 로그 등이 저장됨 (삭제 시 설정 초기화되므로 주의함)
      - ./data:/data
      # Let's Encrypt를 통해 발급받은 SSL 인증서가 저장되는 곳임
      - ./letsencrypt:/etc/letsencrypt
    
    # 컨테이너가 소속될 네트워크 지정함
    networks:
      - proxy-nw

# 네트워크 정의 섹션
networks:
  # 서비스들이 공통으로 사용할 네트워크 이름임
  proxy-nw:
    # 중요: docker-compose가 새로 만들지 않고, 이미 생성된(external) 네트워크를 사용함
    # 이전에 실행한 'docker network create proxy-nw' 명령어로 만든 것을 가져다 씀
    external: true